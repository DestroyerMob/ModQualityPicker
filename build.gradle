plugins {
    id 'java-library'
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'net.neoforged.moddev' version "${moddev_version}"
}

version = mod_version
group = mod_group_id

base {
    archivesName = mod_id
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
    withSourcesJar()
}

sourceSets.main.resources {
    srcDir 'src/generated/resources'
    exclude 'src/generated/resources/.cache/**'
    exclude '**/.cache/**'
}

configurations {
    bootstrapGson
}

tasks.named('processResources', ProcessResources).configure {
    from(configurations.bootstrapGson) {
        into 'bootstrap-libs'
        rename { 'gson.jar' }
    }
}

repositories {
    maven {
        name = 'Fabric'
        url = 'https://maven.fabricmc.net/'
    }
}

dependencies {
    annotationProcessor "net.fabricmc:sponge-mixin:0.15.2+mixin.0.8.7"
    compileOnly "net.fabricmc:sponge-mixin:0.15.2+mixin.0.8.7"
    bootstrapGson("com.google.code.gson:gson:2.11.0") {
        transitive = false
    }
}

neoForge {
    version = project.neo_version

    parchment {
        minecraftVersion = project.parchment_minecraft_version
        mappingsVersion = project.parchment_mappings_version
    }

    runs {
        client {
            client()
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        gameTestServer {
            type = 'gameTestServer'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        configureEach {
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

var generateModMetadata = tasks.register('generateModMetadata', ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
            mod_authors            : mod_authors,
            mod_description        : mod_description,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from 'src/main/templates'
    into 'build/generated/sources/modMetadata'
}

sourceSets.main.resources.srcDir generateModMetadata
neoForge.ideSyncTask generateModMetadata

tasks.named('jar', Jar).configure {
    manifest {
        attributes([
                'Specification-Title'     : mod_id,
                'Specification-Vendor'    : mod_authors,
                'Specification-Version'   : '1',
                'Implementation-Title'    : project.name,
                'Implementation-Version'  : project.jar.archiveVersion,
                'Implementation-Vendor'   : mod_authors,
                'Implementation-Timestamp': new Date().format("yyyy-MM-dd'T'HH:mm:ssZ"),
                'Main-Class'               : 'org.destroyermob.modqualitypicker.bootstrap.BootstrapLauncher'
        ])
    }
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }

    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
    options.compilerArgs += [
            "-AoutRefMapFile=${layout.buildDirectory.file("tmp/compileJava/${mod_id}.refmap.json").get().asFile}",
            "-AmappingTypes=tsrg",
            "-AreobfTsrgFile=${layout.buildDirectory.file("tmp/mixin/inverted.tsrg").get().asFile}",
            "-AoutTsrgFile=${layout.buildDirectory.file("tmp/compileJava/${mod_id}.tsrg").get().asFile}"
    ]
    dependsOn "invertNeoFormTsrg"
}

def mixinRefmapFile = layout.buildDirectory.file("tmp/compileJava/${mod_id}.refmap.json").get().asFile

def normalizeMixinRefmap = tasks.register("normalizeMixinRefmap") {
    dependsOn tasks.named("compileJava")
    outputs.upToDateWhen { false }

    doLast {
        def refmapFile = mixinRefmapFile
        if (!refmapFile.exists()) {
            refmapFile.parentFile.mkdirs()
        }

        def refmap = [
                mappings: [:],
                data    : [
                        searge: [:]
                ]
        ]
        refmapFile.text = groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(refmap)) + System.lineSeparator()
    }
}

def neoFormTsrgInputs = fileTree("${gradle.gradleUserHomeDir}/caches/neoformruntime/intermediate_results") {
    include "*_output.tsrg"
}

tasks.register("invertNeoFormTsrg") {
    def outputFile = layout.buildDirectory.file("tmp/mixin/inverted.tsrg")
    inputs.files(neoFormTsrgInputs)
    outputs.file(outputFile)

    doLast {
        def tsrgFiles = inputs.files.files
        if (tsrgFiles.isEmpty()) {
            throw new GradleException("No NeoForm TSrg mapping file found. Run createMinecraftArtifacts before compiling mixins.")
        }

        def inputFile = tsrgFiles.max { it.lastModified() }
        def classMap = [:]
        def lines = inputFile.readLines("UTF-8")

        lines.each { line ->
            if (!line || line.startsWith("#") || line.startsWith("tsrg2") || line.startsWith("\t")) {
                return
            }

            def parts = line.split(" ")
            if (parts.length == 2 && !parts[0].endsWith("/") && !parts[1].endsWith("/")) {
                classMap[parts[0]] = parts[1]
            }
        }

        def remapDescriptor = { String descriptor ->
            descriptor.replaceAll(/L([^;]+);/) { all, className ->
                "L${classMap[className] ?: className};"
            }
        }

        outputFile.get().asFile.parentFile.mkdirs()
        outputFile.get().asFile.withWriter("UTF-8") { writer ->
            writer.writeLine("tsrg2 left right")

            String obfuscatedClass = null
            String namedClass = null

            lines.each { line ->
                if (!line || line.startsWith("#") || line.startsWith("tsrg2") || line.startsWith("\t\t")) {
                    return
                }

                def parts = line.split(" ")
                if (!line.startsWith("\t")) {
                    if (parts.length == 2 && !parts[0].endsWith("/") && !parts[1].endsWith("/")) {
                        obfuscatedClass = parts[0]
                        namedClass = parts[1]
                        writer.writeLine("${namedClass} ${obfuscatedClass}")
                    }
                    return
                }

                if (obfuscatedClass == null || namedClass == null) {
                    return
                }

                parts[0] = parts[0].substring(1)
                if (parts.length == 2) {
                    writer.writeLine("\t${parts[1]} ${parts[0]}")
                } else if (parts.length == 3) {
                    writer.writeLine("\t${parts[2]} ${remapDescriptor(parts[1])} ${parts[0]}")
                }
            }
        }
    }
}

tasks.named("jar", Jar).configure {
    dependsOn normalizeMixinRefmap
    from(layout.buildDirectory.file("tmp/compileJava/${mod_id}.refmap.json")) {
        into ""
    }
}

def qualityModelSmokeTest = tasks.register("qualityModelSmokeTest", JavaExec) {
    dependsOn tasks.named("testClasses")
    classpath = sourceSets.test.runtimeClasspath
    mainClass = "org.destroyermob.modqualitypicker.profile.QualitySelectionResolverSmoke"
}

def bootstrapApplySmokeTest = tasks.register("bootstrapApplySmokeTest", JavaExec) {
    dependsOn tasks.named("testClasses")
    classpath = sourceSets.test.runtimeClasspath + configurations.bootstrapGson
    mainClass = "org.destroyermob.modqualitypicker.bootstrap.BootstrapApplySmoke"
}

def deferredBootstrapSmokeTest = tasks.register("deferredBootstrapSmokeTest", JavaExec) {
    dependsOn tasks.named("jar"), tasks.named("testClasses")
    classpath = sourceSets.test.runtimeClasspath
    mainClass = "org.destroyermob.modqualitypicker.bootstrap.DeferredBootstrapSmoke"
    doFirst {
        setArgs([tasks.named("jar", Jar).get().archiveFile.get().asFile.absolutePath])
    }
}

tasks.named("test", Test).configure {
    failOnNoDiscoveredTests = false
}

def selfContainedJarSmokeTest = tasks.register("selfContainedJarSmokeTest", Exec) {
    dependsOn tasks.named("jar")
    def javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(21)
    }
    commandLine javaLauncher.map { it.executablePath.asFile }.get(),
            "-jar",
            tasks.named("jar", Jar).flatMap { it.archiveFile }.get().asFile,
            "version"
}

tasks.named("check").configure {
    dependsOn qualityModelSmokeTest, bootstrapApplySmokeTest, deferredBootstrapSmokeTest, selfContainedJarSmokeTest
}

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
